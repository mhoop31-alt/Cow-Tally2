<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Livestock Counter</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            justify-content: space-between;
        }

        .section {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 20px;
        }

        .header { color: #ffd700; font-size: 45px; font-weight: bold; margin-bottom: 5px; }
        .number { font-size: 100px; font-weight: bold; margin: 10px 0; }

        /* Main Add Buttons */
        .btn-add {
            color: white;
            border: none;
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-cow { background-color: #28a745; } /* Green */
        .btn-calf { background-color: #007bff; } /* Blue */

        /* Small Controls */
        .controls { display: flex; gap: 15px; }
        .btn-small {
            background-color: #444;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px;
            flex: 1;
            font-size: 25px;
            font-weight: bold;
        }

        /* 3-Row Total Box */
        .total-box {
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            background-color: #000;
            text-align: center;
        }
        .tally-row { font-size: 28px; font-weight: bold; margin: 5px 0; }
        .cow-text { color: #28a745; }
        .calf-text { color: #007bff; }
        .grand-total { 
            font-size: 42px; 
            color: #ffd700; 
            border-top: 1px solid #333;
            margin-top: 10px;
            padding-top: 10px;
        }

        /* Popup Styles */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .popup {
            background: #222;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
        }
        .popup-btns { display: flex; gap: 20px; margin-top: 20px; }
        .btn-yes { background: #dc3545; color: white; border: none; padding: 15px; flex: 1; font-size: 20px; border-radius: 8px; }
        .btn-no { background: #666; color: white; border: none; padding: 15px; flex: 1; font-size: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="section">
        <div class="header">COWS</div>
        <div id="cow-num" class="number">0</div>
        <button class="btn-add btn-cow" onclick="change('cow', 1)">+ ADD COW</button>
        <div class="controls">
            <button class="btn-small" onclick="change('cow', -1)">- 1</button>
            <button class="btn-small" onclick="showReset('cow')">CLR</button>
        </div>
    </div>

    <div class="section">
        <div class="header">CALVES</div>
        <div id="calf-num" class="number">0</div>
        <button class="btn-add btn-calf" onclick="change('calf', 1)">+ ADD CALF</button>
        <div class="controls">
            <button class="btn-small" onclick="change('calf', -1)">- 1</button>
            <button class="btn-small" onclick="showReset('calf')">CLR</button>
        </div>
    </div>

    <div class="total-box">
        <div class="tally-row cow-text">Cow Tally: <span id="res-cow">0</span></div>
        <div class="tally-row calf-text">Calf Tally: <span id="res-calf">0</span></div>
        <div class="tally-row grand-total">GRAND TOTAL: <span id="res-total">0</span></div>
    </div>

    <div id="overlay">
        <div class="popup">
            <h2 id="popup-text" style="font-size: 30px;">Clear counts?</h2>
            <div class="popup-btns">
                <button class="btn-yes" onclick="resetConfirmed()">YES</button>
                <button class="btn-no" onclick="hideReset()">NO</button>
            </div>
        </div>
    </div>

    <script>
        let counts = { cow: 0, calf: 0 };
        let activeReset = '';

        function change(type, amt) {
            counts[type] = Math.max(0, counts[type] + amt);
            update();
        }

        function showReset(type) {
            activeReset = type;
            document.getElementById('popup-text').innerText = "Clear all " + type + "s?";
            document.getElementById('overlay').style.display = 'flex';
        }

        function hideReset() {
            document.getElementById('overlay').style.display = 'none';
        }

        function resetConfirmed() {
            counts[activeReset] = 0;
            update();
            hideReset();
        }

        function update() {
            document.getElementById('cow-num').innerText = counts.cow;
            document.getElementById('calf-num').innerText = counts.calf;
            document.getElementById('res-cow').innerText = counts.cow;
            document.getElementById('res-calf').innerText = counts.calf;
            document.getElementById('res-total').innerText = counts.cow + counts.calf;
        }
    </script>
</body>
</html>
